<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>刷题系统</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f2f4f8;
}

/* 顶部栏 */
.header{
  background:#4a90e2;
  color:white;
  padding:16px;
  font-size:20px;
  text-align:center;
}

/* 主体 */
.container{
  padding:16px;
}

/* 控制区 */
.controls{
  display:flex;
  flex-direction:column;
  gap:10px;
}

select, button{
  font-size:18px;
  padding:12px;
  border-radius:8px;
  border:none;
}

button{
  background:#4a90e2;
  color:white;
}

button:active{
  transform:scale(0.97);
}

/* 信息栏 */
.info{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
  font-size:18px;
  font-weight:bold;
}

/* 题目 */
#question{
  font-size:22px;
  margin:16px 0;
}

/* 选项 */
.option{
  padding:16px;
  margin:10px 0;
  border-radius:10px;
  background:white;
  border:1px solid #ddd;
  font-size:18px;
}

.option:active{
  transform:scale(0.98);
}

.correct{background:#c8f7c5;}
.incorrect{background:#ffd3d3;}

</style>
</head>

<body>

<div class="header">📘 刷题系统</div>

<div class="container">

<div class="controls">
<select id="chapterSelect"></select>
<button onclick="startChapter()">开始练习</button>
<button onclick="practiceWrong()">练习错题</button>
<button onclick="clearWrong()">清空错题</button>
</div>

<div class="info">
<span id="count"></span>
<span>得分：<span id="score">0</span></span>
</div>

<div id="question"></div>
<div id="options"></div>

<button onclick="next()">下一题</button>

</div>

});

/* ===== CSV解析 ===== */

function parseCSV(csv) {
    const rows = csv.trim().split("\n").slice(1).filter(r => r.trim() !== "");

    return rows.map(row => {
        const cols = row.match(/(".*?"|[^",]+)(?=,|$)/g);

        if (!cols || cols.length < 7) return null;

        return {
            chapter: cols[0].trim(),
            question: cols[1].trim(),
            options: [cols[2], cols[3], cols[4], cols[5]],
            answer: ["A","B","C","D"].indexOf(cols[6].trim())
        };
    }).filter(x => x !== null);
}


/* ===== 初始化 ===== */

let allData = parseCSV(csvData);
let chapters = [...new Set(allData.map(q => q.chapter))];

const select = document.getElementById("chapterSelect");

chapters.forEach(c => {
    let op = document.createElement("option");
    op.value = c;
    op.textContent = c;
    select.appendChild(op);
});


/* ===== 核心逻辑 ===== */

let quizData = [];
let current = 0;
let score = 0;
let answered = false;


/* ✔ 修复后的随机算法（Fisher-Yates） */
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function shuffleOptions(q){
    let arr = q.options.map((o,i)=>({o,i}));
    arr = shuffle(arr);
    q.options = arr.map(x=>x.o);
    q.answer = arr.findIndex(x=>x.i===q.answer);
}


function startChapter(){

    let chapter = select.value;

    quizData = allData.filter(q=>q.chapter === chapter);

    if(quizData.length === 0){
        alert("该章节没有题目！");
        return;
    }

    quizData = shuffle(quizData);

    current = 0;
    score = 0;

    load();
}


function load(){

    answered = false;

    let q = quizData[current];

    shuffleOptions(q);

    document.getElementById("question").textContent = q.question;

    let optDiv = document.getElementById("options");
    optDiv.innerHTML = "";

    q.options.forEach((opt,i)=>{

        let d = document.createElement("div");
        d.className = "option";
        d.textContent = opt;
        d.onclick = ()=>selectAnswer(i);

        optDiv.appendChild(d);
    });

    document.getElementById("count").textContent =
        (current+1)+"/"+quizData.length;

    document.getElementById("score").textContent = score;
}


function selectAnswer(i){

    if(answered) return;

    answered = true;

    let q = quizData[current];
    let opts = document.querySelectorAll(".option");

    if(i === q.answer){
        opts[i].classList.add("correct");
        score++;
    }else{
        opts[i].classList.add("incorrect");
        opts[q.answer].classList.add("correct");
        saveWrong(q);
    }
}


function saveWrong(q){

    let wrong = JSON.parse(localStorage.getItem("wrong") || "[]");

    let exists = wrong.some(item => item.question === q.question);

    if(!exists){
        wrong.push(q);
    }

    localStorage.setItem("wrong", JSON.stringify(wrong));
}


function clearWrong(){

    if(!confirm("确定清空错题？")) return;

    localStorage.removeItem("wrong");
    alert("已清空");
}


function next(){

    if(!answered){
        alert("请先作答");
        return;
    }

    current++;

    if(current >= quizData.length){
        alert(`完成！得分 ${score}/${quizData.length}`);
        return;
    }

    load();
}


function practiceWrong(){

    let wrong = JSON.parse(localStorage.getItem("wrong") || "[]");

    if(wrong.length === 0){
        alert("暂无错题");
        return;
    }

    quizData = shuffle(wrong);

    current = 0;
    score = 0;

    load();
}

</script>
